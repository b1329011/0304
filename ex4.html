<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Ex4 聖誕樹作業</title>
</head>
<body>
    <h1>Ex#4 聖誕樹：請按 F12 打開 Console 查看結果</h1>

    <script>
        function repeatchar(n, arg_char) {
            let result = "";
            for (let i = 0; i < n; i++) {
                result += arg_char;
            }
            return result;
        }

        function printTreeTop(n) {
            for (let i = 1; i <= n; i++) {
                let spaces = repeatchar(n - i, ' ');
                let stars = repeatchar(2 * i - 1, '*');
                console.log(spaces + stars);
            }
        }

        function printTreeBottom(n) {
            for (let i = 0; i < 3; i++) {
                let spaces = repeatchar(n - 1, ' ');
                console.log(spaces + '*');
            }
        }

        function tree(n) {
            console.clear(); 
            printTreeTop(n);
            printTreeBottom(n);
        }

        tree(4);
    </script>
</body>
</html>
